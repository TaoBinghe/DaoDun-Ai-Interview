spring:
  application:
    name: backend
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

  # 数据库配置（PostgreSQL）
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_interview
    username: postgres
    password: 20041230Tbh
    driver-class-name: org.postgresql.Driver

  # 在 JPA/Hibernate 建表之前执行 SQL（用于创建 pgvector 扩展）
  sql:
    init:
      mode: always
      schema-locations: classpath:init-pgvector.sql

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # 邮件配置（QQ 邮箱）
  mail:
    host: smtp.qq.com
    port: 587
    username: 1741893518@qq.com
    password: upfdortpsdanejha
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 3000
          writetimeout: 5000

  # 火山引擎方舟（Ark）大模型 - OpenAI 兼容。
  ai:
    openai:
      base-url: https://ark.cn-beijing.volces.com/api/v3
      api-key: ${ARK_API_KEY:}
      chat:
        options:
          model: doubao-seed-1-6-flash-250828
        completions-path: /chat/completions

# JWT 配置
jwt:
  secret: v9y$B&E)H@McQfTjWnZr4u7x!A%D*G-K
  # Access Token 有效期（秒）：2小时
  access-token-expiration: 7200
  # Refresh Token 有效期（秒）：7天
  refresh-token-expiration: 604800
  # 记住我时 Refresh Token 有效期（秒）：14天
  refresh-token-remember-me-expiration: 1209600

# 服务端口
server:
  port: 8081
  servlet:
    context-path: /

resume:
  max-text-length: 50000
  max-page-count: 15

# RAG 知识库配置
rag:
  enabled: true
  embedding:
    # 火山方舟：此处必须填写「文本向量化」推理接入点 ID（格式 ep-xxxxx），不能填「多模态/图文」向量化(vision)接入点。
    # 若仅有「多模态向量化」接入点，可设置 use-multimodal-endpoint: true，接口会仅传文本。
    # 可通过环境变量 ARK_EMBEDDING_ENDPOINT 覆盖。未配置或类型错误时向量检索不可用。
    model: ${ARK_EMBEDDING_ENDPOINT:}
    use-multimodal-endpoint: false
    dimensions: 1024
  retrieval:
    top-k: 3
    min-score: 0.3
  ingestion:
    source-dir: QAdocs
  prompt:
    max-chars: 2000

# 实时语音通话配置（火山语音）
# 实现「AI 语音回复 + 用户语音输入」需配置以下环境变量（与 STT/TTS 同应用时可共用）：
#   VOLCANO_STT_ENDPOINT  默认 wss 直连端到端（可不设）
#   VOLCANO_STT_APP_ID    控制台 APP ID
#   VOLCANO_STT_API_KEY   控制台 Access Token
#   VOLCANO_STT_APP_KEY   文档固定值（见下）
#   VOLCANO_STT_RESOURCE_ID  文档固定值 volc.speech.dialog
#   VOLCANO_TTS_API_KEY   同 STT 的 Access Token 或 TTS 独立 Key
#   VOLCANO_TTS_APP_KEY   控制台 APP ID（与 STT 同应用则同 VOLCANO_STT_APP_ID）
voice:
  enabled: true
  provider: volcano
  stt:
    endpoint: ${VOLCANO_STT_ENDPOINT:wss://openspeech.bytedance.com/api/v3/realtime/dialogue}
    api-key: ${VOLCANO_STT_API_KEY:}
    app-id: ${VOLCANO_STT_APP_ID:}
    app-key: ${VOLCANO_STT_APP_KEY:PlgvMymc7f3tQnJ6}
    resource-id: ${VOLCANO_STT_RESOURCE_ID:volc.speech.dialog}
    format: webm
    sample-rate: 16000
    mock-enabled: false
  tts:
    endpoint: ${VOLCANO_TTS_ENDPOINT:https://sami.bytedance.com/api/v1/invoke}
    api-key: ${VOLCANO_TTS_API_KEY:${VOLCANO_STT_API_KEY:}}
    app-key: ${VOLCANO_TTS_APP_KEY:${VOLCANO_STT_APP_ID:}}
    resource-id: ${VOLCANO_TTS_RESOURCE_ID:volc.service_type.10029}
    version: v4
    namespace: TTS
    # 端到端实时语音输出需使用实时对话支持的说话人，如 zh_female_vv_jupiter_bigtts
    speaker: ${VOLCANO_TTS_SPEAKER:zh_female_vv_jupiter_bigtts}
    format: mp3
    sample-rate: 24000
    enable-timestamp: true
    mock-enabled: false
