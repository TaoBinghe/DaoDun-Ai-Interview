spring:
  application:
    name: backend
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

  # 数据库配置（PostgreSQL）
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_interview
    username: postgres
    password: 20041230Tbh
    driver-class-name: org.postgresql.Driver

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # 邮件配置（QQ 邮箱）
  mail:
    host: smtp.qq.com
    port: 587
    username: 1741893518@qq.com
    password: upfdortpsdanejha
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 3000
          writetimeout: 5000

  # 火山引擎方舟（Ark）大模型 - OpenAI 兼容。
  ai:
    openai:
      base-url: https://ark.cn-beijing.volces.com/api/v3
      api-key: ${ARK_API_KEY:}
      chat:
        options:
          model: doubao-seed-1-6-flash-250828
        completions-path: /chat/completions

# JWT 配置
jwt:
  secret: v9y$B&E)H@McQfTjWnZr4u7x!A%D*G-K
  # Access Token 有效期（秒）：2小时
  access-token-expiration: 7200
  # Refresh Token 有效期（秒）：7天
  refresh-token-expiration: 604800
  # 记住我时 Refresh Token 有效期（秒）：14天
  refresh-token-remember-me-expiration: 1209600

# 服务端口
server:
  port: 8081
  servlet:
    context-path: /

resume:
  max-text-length: 50000
  max-page-count: 15

# RAG 知识库配置
rag:
  enabled: true
  embedding:
    model: doubao-embedding-large-text-240915
    dimensions: 1024
  retrieval:
    top-k: 3
    min-score: 0.3
  ingestion:
    source-dir: QAdocs
  prompt:
    max-chars: 2000
